events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    upstream soaring_voyage_app {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name school-grader.internal _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name school-grader.internal _;

        ssl_certificate     /etc/nginx/ssl/mathgrader.crt;
        ssl_certificate_key /etc/nginx/ssl/mathgrader.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;

        client_max_body_size 10m;
        client_body_timeout 60s;
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # Regex location is evaluated before the generic /api/ proxy. One-time
        # SSE tickets are query parameters, so access logging is disabled here.
        location ~ ^/api/v1/submissions/[^/]+/events$ {
            proxy_pass http://soaring_voyage_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            add_header X-Accel-Buffering no always;
            access_log off;
        }

        location /api/ {
            proxy_pass http://soaring_voyage_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_hide_header X-Powered-By;
        }

        location = /health {
            proxy_pass http://soaring_voyage_app/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            root /opt/soaring-voyage/frontend/dist;
            try_files $uri $uri/ /index.html;
            expires 1h;
        }
    }
}
