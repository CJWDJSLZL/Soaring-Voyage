name: backend-ci

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Ruff lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy
        run: mypy app migrations

  test-and-harness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soaring_voyage_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d soaring_voyage_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/soaring_voyage_test
      PGPASSWORD: postgres_ci_password
      SECRET_KEY: ci_only_secret_key_at_least_32_characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Apply PostgreSQL migrations
        run: python -m migrations.migrate
      - name: Pytest with coverage gate
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Harness quality gate
        run: >-
          python scripts/run_harness_ci.py --mock --min-cases 180
          --fail-below 0.94 --report-file reports/harness_ci.json
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-reports
          path: |
            backend/coverage.xml
            backend/reports/harness_ci.json
          if-no-files-found: warn
