name: backend-ci

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Ruff lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy
        run: mypy app migrations

  test-and-harness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soaring_voyage_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d soaring_voyage_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:postgres_ci_password@127.0.0.1:5432/soaring_voyage_test
      PGPASSWORD: postgres_ci_password
      SECRET_KEY: ci_only_secret_key_at_least_32_characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Apply PostgreSQL migrations
        run: python -m migrations.migrate
      - name: Prepare runtime-role integration database
        env:
          CI_RUNTIME_PASSWORD: runtime_ci_password
          CI_TENANT_ID: 11111111-1111-4111-8111-111111111111
        run: |
          python - <<'PY'
          import asyncio
          import os
          import asyncpg

          async def prepare():
              connection = await asyncpg.connect(os.environ["DATABASE_URL"])
              try:
                  password = os.environ["CI_RUNTIME_PASSWORD"].replace("'", "''")
                  await connection.execute(
                      f"ALTER ROLE soaring_voyage_app LOGIN PASSWORD '{password}'"
                  )
                  await connection.execute(
                      """
                      INSERT INTO tenants (id, name, code)
                      VALUES ($1, 'CI Integration School', 'ci-integration')
                      ON CONFLICT (id) DO NOTHING
                      """,
                      os.environ["CI_TENANT_ID"],
                  )
              finally:
                  await connection.close()

          asyncio.run(prepare())
          PY
      - name: Pytest with coverage gate
        env:
          TEST_DATABASE_URL: postgresql://soaring_voyage_app:runtime_ci_password@127.0.0.1:5432/soaring_voyage_test
          TEST_DEFAULT_TENANT_ID: 11111111-1111-4111-8111-111111111111
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Harness quality gate
        run: >-
          python scripts/run_harness_ci.py --mock --min-cases 180
          --fail-below 0.94 --report-file reports/harness_ci.json
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-reports
          path: |
            backend/coverage.xml
            backend/reports/harness_ci.json
          if-no-files-found: warn
