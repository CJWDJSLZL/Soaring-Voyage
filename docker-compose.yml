name: soaring-voyage

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soaring_voyage}
      POSTGRES_USER: ${POSTGRES_USER:-soaring_voyage_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-app-user.sh:/docker-entrypoint-initdb.d/010-app-user.sh:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    shm_size: 256mb
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - >-
        exec redis-server --requirepass "$${REDIS_PASSWORD}"
        --maxmemory 512mb --maxmemory-policy allkeys-lru
        --appendonly yes --appendfsync everysec
        --rename-command FLUSHALL "" --rename-command FLUSHDB ""
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: soaring-voyage-app:${APP_IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?set MIGRATION_DATABASE_URL in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      APP_ENV: development
      API_PREFIX: ${API_PREFIX:-/api/v1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QIANWEN_API_KEY: ${QIANWEN_API_KEY:-}
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_MIN_SIZE: ${DB_MIN_SIZE:-5}
      DB_MAX_SIZE: ${DB_MAX_SIZE:-25}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-30}
      DB_MAX_INACTIVE_LIFETIME: ${DB_MAX_INACTIVE_LIFETIME:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  app_logs:

networks:
  default:
    name: soaring-voyage-network
